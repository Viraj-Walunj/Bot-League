<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bot League - Rankings</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarpanch:wght@600&family=Poppins:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; background: #FBFBFB; }
  .font-sarpanch { font-family: 'Sarpanch', sans-serif; }
  .font-poppins { font-family: 'Poppins', sans-serif; }

  .filter-card {
  border: 1.3px solid transparent;
  background-image: linear-gradient(white, white), 
                    linear-gradient(180deg,  #0162D1 0%, #8C6CFF 100%);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  border-radius: 20px;
}

  .filter-input {
    box-shadow: inset 4px 4px 4px 0px rgba(0, 0, 0, 0.25);
    border: 1.3px solid transparent;
  background-image: linear-gradient(white, white), linear-gradient(180deg,  #0162D1 0%, #8C6CFF 100%);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  border-radius: 8px;
  }

  /* Laurel wreath medal badge - used for rank 1/2/3 */
  .wreath-badge {
    position: relative;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink:0; 
  }
  .wreath-badge svg { position: absolute; inset: 0; width: 44px; height: 44px; }
  .wreath-badge span { position: relative; z-index: 1; font-weight: 500; font-size: 20px; }

  /* Bottom decorative gradient band
  .bottom-fade {
    background: linear-gradient(180deg, rgba(1, 98, 209, 0.11) 0%, rgba(140, 108, 255, 0.11) 100%);
  } */
</style>
</head>

<body class="min-h-screen overflow-auto">

  <main class="relative ml-auto  w-full max-w-[1248px]  pt-32 pb-8 ">

    <img
  src="images/star.png"
  alt=""
  class="absolute left-[405px] top-[335px] w-[132px] h-[112px] opacity-100 -z-10 pointer-events-none"
/>

    <!-- Page title -->
    <h1 class="pl-11 font-sarpanch text-[32px] font-semibold text-[#0162D1] sm:text-[35px]">
      Rankings
    </h1>

    <!-- Sort / filter card -->
    <div class="filter-card ml-9 mt-[4px] mb-[40px] max-w-[1099px] h-[173px] w-full bg-white pt-4 pb-6 px-6 shadow-[0_4px_4px_1px_rgba(0,0,0,0.25)] sm:p-9">
      <h2 class="pl-1 font-poppins mt-[-8px] mb-3 text-[30px] font-medium text-[#0162D1] sm:text-[30px]">
        Sort by
      </h2>

      <div class="flex flex-col gap-4 lg:flex-row lg:items-center">
        <!-- Select Sport -->
        <div class="relative w-full lg:max-w-[475px] ml-1">
          <select
            id="sportFilter"
            class="filter-input h-[51px] w-full appearance-none rounded-lg bg-white px-4 pr-10 text-[16px] font-medium text-black/[0.46] outline-none"
          >
            <option value="">Select Sport</option>
            <option value="robo-war">Robo War</option>
            <option value="robo-soccer">Robo Soccer</option>
            <option value="line-follower">Line Follower</option>
            <option value="drone-racing">Drone Racing</option>
          </select>
          <svg class="pointer-events-none absolute right-7 top-1/2 -translate-y-1/2" width="16" height="9" viewBox="0 0 16 9" fill="none">
            <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0162D1" />
      <stop offset="100%" stop-color="#8C6CFF" />
    </linearGradient>
  </defs>
            <path d="M1 1L8 8L15 1"  stroke="url(#arrowGradient)"  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Select Category -->
        <div class="relative w-full lg:max-w-[303px] -ml-[3px]">
          <select
            id="categoryFilter"
            class="filter-input h-[51px] w-full appearance-none rounded-lg bg-white px-4 pr-10 text-[16px] font-medium text-black/[0.46] outline-none"
          >
            <option value="">Select Category</option>
            <option value="junior">Junior Innovators (8–11 yrs)</option>
            <option value="young">Young Engineers (12–17 yrs)</option>
            <option value="robo-minds">Robo Minds (18+ yrs)</option>
          </select>
          <svg class="pointer-events-none absolute right-6 top-1/2 -translate-y-1/2" width="16" height="9" viewBox="0 0 16 9" fill="none">
            <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0162D1" />
      <stop offset="100%" stop-color="#8C6CFF" />
    </linearGradient>
  </defs>
            <path d="M1 1L8 8L15 1"  stroke="url(#arrowGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Apply Filter -->
        <button
          id="applyFilterBtn"
          class="h-[51px] w-[159px] ml-auto mr-3 shrink-0 rounded-md bg-gradient-to-b from-[#0162D1]/[0.75] to-[#8C6CFF]/[0.75] px-6 text-[16px] font-medium text-white shadow-[0_4px_4px_rgba(0,0,0,0.25)] transition hover:brightness-110"
        >
          Apply Filter
        </button>
      </div>
    </div>

    <!-- Global Rankings section -->
    <h2 class="pl-11 font-poppins mb-4 text-[24px] font-medium text-[#0162D1] sm:text-[28px] ">
      Global Rankings
    </h2>


    <!-- Headers + Rankings Wrapper -->
<div class="flex justify-end">
  <div class="w-[1198px] ">

    <!-- Column headers -->
    <div class="mb-3 grid grid-cols-[175px_340px_199px_215px_1fr] items-center w-full max-w-[1198px] ml-auto ">
  <span class="pl-[37px] text-[23px] font-normal text-[#0162D1] ">Rank</span>
  <span class="text-[23px] font-normal text-[#0162D1]">Team</span>
  <span class="text-[23px] font-normal text-[#0162D1]">Points</span>
  <span class="text-[23px] font-normal text-[#0162D1]">Events</span>
  <span class="text-[23px] font-normal text-[#0162D1]">Matches Played</span>
</div>

    <!-- Rankings rows -->
    <div id="rankingsList" class="flex flex-col gap-[14px] w-full max-w-[1198px] ml-auto "></div>

  </div>
</div>
  </main>

  <!-- Bottom decorative band -->
  <!-- <div class="bottom-fade h-56 w-full"></div> -->

    function renderRow(entry) {
  const isTop1 = entry.rank === 1;
  const medalStyle = RANK_STYLES[entry.rank];

  // Backgrounds
  const rowBg = isTop1
    ? "background: linear-gradient(90deg, #8C6CFF 0%, #3995FF 64.91%, #CFCFCF 100%);"
    : "background: #F2F2F2;";

  // Borders
  let rowBorder;

  if (isTop1) {
    rowBorder = "border: 1px solid transparent; border-left: 6px solid #FFDD00;";
  } else if (entry.rank === 2 || entry.rank === 3) {
    rowBorder = `border:1px solid #CFCFCF; border-left:6px solid ${medalStyle.border};`;
  } else {
    rowBorder = "border:1px solid rgba(207,207,207,.8);border-left: 6px solid transparent;";
  }

  const textColor = isTop1
    ? "text-white/[0.94]"
    : "text-[rgba(56,19,190,0.85)]";

  const weight = isTop1 ? "font-semibold" : "font-medium";

  const rankCell = medalStyle
    ? `
      <div class="wreath-badge">
        ${laurelWreathSvg(medalStyle.wreath)}
        <span class="${isTop1 ? "text-white" : medalStyle.text}">
          ${entry.rank}
        </span>
      </div>`
    : `
      
      <span class="text-[20px] ml-4 ${textColor}  ${weight}">
        ${entry.rank}
      </span>`;

  return `
    <div
      class="grid grid-cols-[175px_340px_220px_1fr_200px] items-center w-full max-w-[1198px] h-[64px] rounded-[12px]"
      style="${rowBg} ${rowBorder}"
    >

      <!-- Rank -->
      <div class="pl-[36px] flex items-center">
        ${rankCell}
      </div>

      <!-- Team -->
      <div class="flex items-center gap-[20px]">
        <img
          src="${entry.avatar}"
          alt=""
          class="w-[40px] h-[40px] rounded-lg bg-[#D9D9D9] object-cover"
        />

        <span class="text-[20px] ${weight} ${textColor}">
          ${entry.team}
        </span>
      </div>

      <!-- Points -->
      <span class="text-[20px] ${weight} ${textColor}">
        ${entry.points}
      </span>

      <!-- Events -->
      <span class="text-[20px] ${weight} ${textColor}">
        ${entry.events}
      </span>

      <!-- Matches -->
      <span class="text-[20px] ${weight} ${textColor}">
        ${entry.matches}
      </span>

    </div>
  `;
}

    function renderRankings(data) {
      const container = document.getElementById("rankingsList");
      container.innerHTML = data.map(renderRow).join("");
    }

    renderRankings(mockRankings);

    //Filter handling 
    document.getElementById("applyFilterBtn").addEventListener("click", () => {
      const sport = document.getElementById("sportFilter").value;
      const category = document.getElementById("categoryFilter").value;
      console.log("Apply Filter clicked:", { sport, category });
    });
  </script>

</body>
</html>
