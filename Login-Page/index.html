<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bot League — Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Poppins:wght@500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; }
  .font-poppins { font-family: 'Poppins', sans-serif; }
  .font-racing { font-family: 'Racing Sans One', cursive; }

  .gradient-border-card {
    min-height: 763px;
    width: 692px;
    padding-top: 60px !important; 
    padding-bottom: 40px !important;
    background:
      linear-gradient(#ffffff, #ffffff) padding-box,
      linear-gradient(135deg, rgba(1, 98, 209, 0.75), rgba(140, 108, 255, 0.75)) border-box;
    border: 7px solid transparent;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

.gradient-border-btn {
    border: 1.5px solid transparent !important;
    background-image: 
      linear-gradient(#ffffff, #ffffff), 
      linear-gradient(to right, #0162D1, #8C6CFF) !important;
    background-origin: border-box !important;
    background-clip: padding-box, border-box !important;
  }

  .gradient-border-btn:hover {
    background-image: 
      linear-gradient(#f8faff, #f8faff), 
      linear-gradient(to right, #0162D1, #8C6CFF) !important;
  }

  .form-input {
    height: 51px !important; 
    width: 100% !important; /* Container handles width */
    background-color: rgba(221, 221, 221, 0.42) !important;
    border: 1px solid #BDBDBD !important;
    border-radius: 12px !important;
    box-shadow: inset 4px 4px 4px rgba(0, 0, 0, 0.25) !important;
    padding: 0 20px !important;
    outline: none;
    transition: all 0.2s ease;
  }

  .form-input:focus {
    border-color: #0162D1 !important;
    background-color: #ffffff !important;
    box-shadow: none !important;
  }

  .form-input::placeholder { color: rgba(0, 0, 0, 0.45) !important; }
</style>
</head>

<body class="relative min-h-screen bg-white">
  <main class="relative z-10 flex min-h-screen flex-col items-center px-4 pt-[72px] pb-15">
    
    <!-- Logo -->
    <div class="mb-[36.5px]  inline-flex  flex-col items-center -mt-[3px]">
      <div class="w-full flex justify-start pl-2 ">
    <span class="h-[2px] w-20 bg-[#0162D1] "></span>
  </div>
      <h1 class="font-racing whitespace-nowrap text-[45px] leading-none tracking-[-0.3px] text-black ">BOT LEAGUE</h1>
      <div class="w-full flex justify-end pr-2">
    <span class="h-[2px] w-36 bg-[#FC4C4C]"></span>
      </div>
    </div>

    <!-- Login card -->
    <div class="gradient-border-card relative rounded-[12px] shadow-[0_4px_30px_rgba(0,0,0,0.06)]">

      <h2 class="font-poppins mb-10 pl-1 text-center text-[38px] font-semibold text-[#0162D1]">
        Welcome Back!
      </h2>

      <!-- Centered form with specific 466px width -->
      <form id="loginForm" class="flex flex-col w-[466px] gap-5" novalidate>

        <!-- Mobile number -->
        <div class="flex flex-col mt-5">
          <label class="font-poppins text-[22px] font-medium text-black mb-1 pl-1">Mobile number</label>
          <input type="tel" placeholder="Enter here" class="form-input" />
        </div>

        <!-- Password -->
        <div class="flex flex-col ">
          <label class="font-poppins text-[22px] font-medium text-black pl-1">Password</label>
          <input type="password" placeholder="Enter here" class="form-input" />
          <a href="#" class="self-end mt-4 text-[16px] font-semibold text-[#8C6CFF] hover:brightness-125">Forgot password?</a>
        </div>

        <!-- Grouped Action Buttons -->
        <div class="flex flex-col gap-4 mt-3">
          <button type="submit" class=" h-[48px] w-full rounded-[12px] bg-gradient-to-b from-[#8C6CFF]/[0.75] to-[#0162D1]/[0.75] font-poppins text-[18px] font-semibold text-white shadow-md hover:brightness-110">
            Login
          </button>

          <button type="button" class="h-[48px] w-full items-center justify-center rounded-[12px] bg-black/20 transition hover:bg-black/30
         font-poppins text-[18px] font-semibold text-[#0162D1]">
            Login with Google
          </button>

          <div class="flex items-center justify-center mt-1">
            <span class="text-sm font-medium text-black">OR</span>
          </div>

          <a href="#" id="createAccountBtn" class="gradient-border-btn flex h-[48px] w-full items-center justify-center rounded-[12px] font-poppins text-[18px] font-semibold text-[#0162D1] mt-0.5">
            Create new account
          </a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
