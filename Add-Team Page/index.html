<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bot League - Team Dashboard</title>

<!-- Tailwind via CDN -->
<script src="https://cdn.tailwindcss.com"></script>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarpanch:wght@500&family=Poppins:wght@700&family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Inter', sans-serif; background: #FFFFFF; }
  .font-sarpanch { font-family: 'Sarpanch', sans-serif; }
  .font-poppins { font-family: 'Poppins', sans-serif; }
  .font-grotesk { font-family: 'Space Grotesk', sans-serif; }

  .star-outline {
    fill: none;
    stroke: url(#starGradient);
    stroke-width: 2;
    opacity: 0.15;
  }
</style>
</head>

<body class="relative min-h-screen overflow-hidden bg-white">

  <!-- SVG gradient defs-->
  <svg width="0" height="0" class="absolute">
    <defs>
      <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0162D1"/>
        <stop offset="100%" stop-color="#8C6CFF"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Decorative stars -->
  <svg class="star-outline pointer-events-none absolute right-[18%] top-[12%] h-24 w-24" viewBox="0 0 51 49"><path d="M25.5 0l6.2 18.1H51L35.9 29.3l6.2 18.1L25.5 36.2 9.9 47.4l6.2-18.1L1 18.1h19.3z"/></svg>
  <svg class="star-outline pointer-events-none absolute left-[8%] top-[54%] h-10 w-10" viewBox="0 0 51 49"><path d="M25.5 0l6.2 18.1H51L35.9 29.3l6.2 18.1L25.5 36.2 9.9 47.4l6.2-18.1L1 18.1h19.3z"/></svg>
  <svg class="star-outline pointer-events-none absolute right-[16%] top-[38%] h-16 w-16" viewBox="0 0 51 49"><path d="M25.5 0l6.2 18.1H51L35.9 29.3l6.2 18.1L25.5 36.2 9.9 47.4l6.2-18.1L1 18.1h19.3z"/></svg>
  <svg class="star-outline pointer-events-none absolute right-[10%] bottom-[8%] h-16 w-16" viewBox="0 0 51 49"><path d="M25.5 0l6.2 18.1H51L35.9 29.3l6.2 18.1L25.5 36.2 9.9 47.4l6.2-18.1L1 18.1h19.3z"/></svg>
  <svg class="star-outline pointer-events-none absolute left-[52%] top-[10%] h-10 w-10" viewBox="0 0 51 49"><path d="M25.5 0l6.2 18.1H51L35.9 29.3l6.2 18.1L25.5 36.2 9.9 47.4l6.2-18.1L1 18.1h19.3z"/></svg>

  <main class="relative z-10 min-h-screen w-full pb-16 pl-6 pr-6 pt-16 sm:pl-10 sm:pt-20 lg:pl-[261px] lg:pt-[189px] lg:pr-16">

    <!-- Decorative plane image -->
    <img
      src="https://placehold.co/229x184"
      alt=""
      class="pointer-events-none absolute left-0 top-[130px] hidden w-[180px] -rotate-[23deg] opacity-90 sm:block lg:left-[-30px] lg:w-[229px]"
    />

    <!-- Page title -->
    <h1 class="font-sarpanch relative z-10 text-[38px] font-medium leading-[12px] text-[#0162D1] ">
      Team Dashboard
    </h1>

    <!-- Stat cards row -->
    <div class="relative z-10 mt-[80px] flex flex-wrap gap-[97px] gap-y-6">

      <!-- Total Robots -->
      <div class="flex items-center gap-[21px] w-[183px] shrink-0">
    <div class="flex h-[56px] w-[60px] shrink-0 items-center justify-center rounded-lg bg-black/[0.1] p-[12px]">
      <svg class="h-[32px] w-[32px] text-[#0162D1]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/><path d="M12 8V4M9 4h6"/></svg>
    </div>
    <div class="w-[102px] h-[56px] flex flex-col items-start p-0">
      <div class="font-grotesk flex h-[40px] items-center text-[36px] font-bold leading-[40px] text-black">0</div>
      <div class="font-grotesk flex h-[16px] items-center text-[12px] font-medium uppercase tracking-[1.2px] text-black">Total Robots</div>
    </div>
  </div>

      <!-- Active Robots -->
      <div class="flex items-center gap-[21px] w-[183px] shrink-0 ">
    <div class="flex h-[56px] w-[60px] shrink-0 items-center justify-center rounded-lg bg-black/[0.06] p-[12px]">
      <svg class="h-[32px] w-[32px] text-[#0162D1]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>
    </div>
    <div class="w-[110px] h-[56px] flex flex-col items-start p-0">
      <div class="font-grotesk flex h-[40px] items-center text-[36px] font-bold leading-[40px] text-black">0</div>
      <div class="font-grotesk flex h-[16px] items-center text-[12px] font-medium uppercase tracking-[1.2px] text-black whitespace-nowrap">Active Robots</div>
    </div>
  </div>

      <!-- Team Ranking -->
      <div class="flex items-center gap-[21px] w-[183px] shrink-0">
    <div class="flex h-[56px] w-[60px] shrink-0 items-center justify-center rounded-lg bg-black/[0.06] p-[12px]">
      <svg class="h-[32px] w-[32px] text-[#0162D1]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="8"/><rect x="10" y="7" width="4" height="13"/><rect x="17" y="4" width="4" height="16"/></svg>
    </div>
    <div class="w-[110px] h-[56px] flex flex-col items-start p-0">
      <div class="font-grotesk flex h-[40px] items-center text-[36px] font-bold leading-[40px] text-black">--</div>
      <div class="font-grotesk flex h-[16px] items-center text-[12px] font-medium uppercase tracking-[1.2px] text-black">Team Ranking</div>
    </div>
  </div>

      <!-- Matches Played -->
      <div class="flex items-center gap-[21px] w-[200px] shrink-0">
    <div class="flex h-[56px] w-[60px] shrink-0 items-center justify-center rounded-lg bg-black/[0.06] p-[12px]">
      <svg class="h-[32px] w-[32px] text-[#0162D1]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    </div>
    <div class="w-[124px] h-[56px] flex flex-col items-start p-0">
      <div class="font-grotesk flex h-[40px] items-center text-[36px] font-bold leading-[40px] text-black">0</div>
      <div class="font-grotesk flex h-[16px] items-center text-[12px] font-medium uppercase tracking-[1.2px] text-black">Matches Played</div>
    </div>
  </div>
    </div>

    <!-- Create-team card -->
    <div class="relative z-10 mt-[67px] flex flex-col overflow-hidden rounded-[10px] border border-[#0162D1] bg-white lg:h-[485px] lg:max-w-[1046px] lg:flex-row">

      <!-- Squad image -->
      <div class="relative w-full p-4 lg:w-1/2 lg:p-6 mt-[5px]">
        <img
          src="image/1.jpg"
          alt="Your future BotCrew"
          class="absolute z-20 h-[425px] w-[505px] rounded-[12px] object-cover "
        />
      </div>

      <!-- Copy + CTA -->
      <div class="flex flex-1 flex-col justify-center gap-6 p-6  ml-3">
        <h2 class="font-poppins h-[80px] w-[458px] bg-gradient-to-r from-[#8C6CFF] to-[#0162D1] bg-clip-text text-[36px] font-bold leading-[40px] text-transparent flex items-center">
          Assemble Your BotCrew Now!
        </h2>

        <p class="max-w-[420px] text-[16px] leading-relaxed text-black sm:text-[18px] -mt-3">
          Join or Create your first team and participate in exciting BotLeague competitions!
        </p>

        <div>
          <button
            id="createTeamBtn"
            class="flex h-[56px] w-[367px] items-center gap-[12px] rounded-[8px] bg-gradient-to-b from-[#8C6CFF]/[0.75] to-[#0162D1]/[0.75] px-[40px] py-[16px] text-white shadow-md transition hover:brightness-110 -mb-[5px]"
          >
            <svg class="h-[24x] w-[24px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span class="font-grotesk h-[24px] w-[251px] text-[18px] font-bold uppercase tracking-[1.6px] sm:text-[18px] whitespace-nowrap">
              Create Your First Team
            </span>
          </button>

          <a href="#" id="joinTeamLink" class="mt-4 block text-[15px] font-medium text-[#8C6CFF] transition hover:brightness-125 sm:text-[16px]">
            No team yet? Let your Captain create one.
          </a>
        </div>
      </div>
    </div>

  </main>

  <script>

    document.getElementById("createTeamBtn").addEventListener("click", () => {
      // TODO: navigate to /create-team
      console.log("Navigate to Create Team");
    });

    document.getElementById("joinTeamLink").addEventListener("click", (e) => {
      e.preventDefault();
      // TODO: navigate to /create-team or /join-team depending on final flow
      console.log("No team yet link clicked");
    });
  </script>

</body>
</html>
